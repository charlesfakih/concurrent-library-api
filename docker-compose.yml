name: full-app

services:
  backend:
    build: .
    container_name: library-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://charles:devpassword@db/library
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    container_name: app_database
    environment:
      POSTGRES_USER: charles
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charles -d library"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  app-network: